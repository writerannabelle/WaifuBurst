<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waifu Burst</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --blue: #2196F3;
    --red: #f44336;
    --blue-glow: rgba(33,150,243,0.5);
    --red-glow: rgba(244,67,54,0.5);
    --gold: #FFD700;
    --bg-dark: #0a0a1a;
    --bg-card: #1a1a2e;
    --bg-board: #16213e;
  }

  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--bg-dark);
    color: #e0e0e0;
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(100,50,180,0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 50%, rgba(200,80,140,0.08) 0%, transparent 50%);
  }

  /* ── TITLE SCREEN ── */
  #title-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; text-align: center; animation: fadeIn 1s;
  }
  #title-screen h1 {
    font-family: 'Orbitron', sans-serif; font-size: 4rem; font-weight: 900;
    background: linear-gradient(135deg, #ff6b9d, #c44dff, #6b9dff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-shadow: 0 0 40px rgba(196,77,255,0.3);
    margin-bottom: 0.5rem; letter-spacing: 4px;
  }
  #title-screen .subtitle {
    font-size: 1.1rem; color: #888; margin-bottom: 3rem; letter-spacing: 6px; text-transform: uppercase;
  }
  .menu-btn {
    display: block; width: 280px; padding: 14px 24px; margin: 8px auto;
    font-family: 'Orbitron', sans-serif; font-size: 1rem; font-weight: 700;
    border: 2px solid rgba(196,77,255,0.4); border-radius: 8px;
    background: rgba(196,77,255,0.1); color: #ddd; cursor: pointer;
    transition: all 0.3s; letter-spacing: 2px;
  }
  .menu-btn:hover {
    background: rgba(196,77,255,0.25); border-color: #c44dff;
    box-shadow: 0 0 20px rgba(196,77,255,0.3); color: #fff;
    transform: translateY(-2px);
  }

  /* ── SETUP SCREEN ── */
  #setup-screen { display:none; min-height:100vh; padding:2rem; max-width:900px; margin:0 auto; }
  #setup-screen h2 {
    font-family:'Orbitron',sans-serif; font-size:1.8rem; text-align:center;
    margin-bottom:2rem; color:#c44dff;
  }
  .setup-section {
    background: rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08);
    border-radius:12px; padding:1.5rem; margin-bottom:1.5rem;
  }
  .setup-section h3 { font-family:'Orbitron',sans-serif; font-size:1rem; margin-bottom:1rem; color:#6b9dff; }
  .rule-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); gap:10px; }
  .rule-toggle {
    display:flex; align-items:center; gap:8px; padding:10px 14px;
    background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08);
    border-radius:8px; cursor:pointer; transition:all 0.2s; user-select:none;
  }
  .rule-toggle:hover { background:rgba(255,255,255,0.06); }
  .rule-toggle.active { border-color:rgba(196,77,255,0.5); background:rgba(196,77,255,0.1); }
  .rule-toggle input { display:none; }
  .rule-indicator {
    width:18px; height:18px; border-radius:4px; border:2px solid #555;
    display:flex; align-items:center; justify-content:center; transition:all 0.2s; flex-shrink:0;
  }
  .rule-toggle.active .rule-indicator { border-color:#c44dff; background:#c44dff; }
  .rule-indicator::after { content:'✓'; color:#fff; font-size:12px; opacity:0; transition:opacity 0.2s; }
  .rule-toggle.active .rule-indicator::after { opacity:1; }
  .rule-label { font-size:0.95rem; font-weight:600; }
  .rule-desc { font-size:0.75rem; color:#888; margin-top:2px; }
  .diff-select { display:flex; gap:10px; margin-top:0.5rem; }
  .diff-btn {
    flex:1; padding:10px; border:2px solid rgba(255,255,255,0.1); border-radius:8px;
    background:rgba(255,255,255,0.03); color:#ccc; cursor:pointer; text-align:center;
    font-family:'Rajdhani',sans-serif; font-weight:600; font-size:0.95rem; transition:all 0.2s;
  }
  .diff-btn:hover { background:rgba(255,255,255,0.06); }
  .diff-btn.active { border-color:#c44dff; background:rgba(196,77,255,0.15); color:#fff; }

  /* ── DECK SELECTION ── */
  .deck-picker { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-top:1rem; }
  .deck-card-pick {
    width:80px; height:100px; border-radius:8px; cursor:pointer;
    border:2px solid rgba(255,255,255,0.1); background:var(--bg-card);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    transition:all 0.2s; position:relative; overflow:hidden;
  }
  .deck-card-pick:hover { border-color:rgba(196,77,255,0.5); transform:translateY(-3px); }
  .deck-card-pick.selected { border-color:#c44dff; box-shadow:0 0 12px rgba(196,77,255,0.4); }
  .deck-card-pick .card-rank { font-family:'Orbitron',sans-serif; font-size:0.7rem; font-weight:700; }
  .deck-card-pick .card-name { font-size:0.65rem; color:#aaa; text-align:center; margin-top:4px; }
  .deck-card-pick .card-emoji { font-size:1.8rem; margin-bottom:4px; }

  .start-game-btn {
    display:block; width:240px; margin:2rem auto 0; padding:14px;
    font-family:'Orbitron',sans-serif; font-size:1.1rem; font-weight:700;
    background:linear-gradient(135deg,#c44dff,#6b9dff); color:#fff;
    border:none; border-radius:8px; cursor:pointer; transition:all 0.3s; letter-spacing:2px;
  }
  .start-game-btn:hover { transform:translateY(-2px); box-shadow:0 6px 24px rgba(196,77,255,0.4); }
  .start-game-btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; box-shadow:none; }

  /* ── GAME SCREEN ── */
  #game-screen { display:none; min-height:100vh; padding:1rem; }
  .game-layout {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:calc(100vh - 2rem); max-width:1100px; margin:0 auto;
  }
  .game-play-area {
    display:flex; align-items:center; justify-content:center; gap:1.5rem;
  }
  .game-header {
    text-align:center; padding:0.5rem 0 1rem;
    font-family:'Orbitron',sans-serif;
  }
  .game-header h2 { font-size:1.4rem; color:#c44dff; }

  .turn-indicator { font-size:0.9rem; color:#888; margin-top:4px; }
  .active-rules-bar {
    display:flex; gap:6px; justify-content:center; flex-wrap:wrap; margin-top:8px;
  }
  .active-rule-tag {
    padding:3px 10px; border-radius:12px; font-size:0.7rem; font-weight:700;
    background:rgba(196,77,255,0.15); border:1px solid rgba(196,77,255,0.3); color:#c44dff;
    letter-spacing:1px; text-transform:uppercase;
  }

  /* ── HAND AREAS ── */
  .hand-area { display:flex; flex-direction:column; align-items:center; padding-top:0.5rem; }
  .hand-area.left { align-items:flex-end; }
  .hand-area.right { align-items:flex-start; }
  .hand-stack { position:relative; width:110px; }
  .hand-stack .card { position:absolute; left:0; }
  .hand-label {
    font-family:'Orbitron',sans-serif; font-size:0.85rem; color:#888;
    text-align:center; margin-bottom:4px; letter-spacing:2px;
  }

  /* ── CARDS ── */
  .card {
    width:110px; height:140px; border-radius:10px; position:relative;
    cursor:pointer; transition:all 0.3s; overflow:visible;
    border:2px solid rgba(255,255,255,0.15);
  }
  .card.blue { background:linear-gradient(135deg,#1a237e,#1565C0); border-color:rgba(33,150,243,0.4); }
  .card.red { background:linear-gradient(135deg,#7e1a1a,#C01515); border-color:rgba(244,67,54,0.4); }
  .card.blue.glow { box-shadow:0 0 16px var(--blue-glow); }
  .card.red.glow { box-shadow:0 0 16px var(--red-glow); }
  .card.selected { transform:scale(1.08); box-shadow:0 0 20px rgba(255,215,0,0.6); border-color:var(--gold); }
  .card.dragging { opacity:0.4; transform:scale(0.95); }
  .card.draggable { cursor:grab; }
  .card.draggable:active { cursor:grabbing; }
  .board-cell.drop-hover {
    border-color:rgba(255,200,230,0.8) !important;
    background:rgba(255,150,200,0.2) !important;
    box-shadow:inset 0 0 15px rgba(255,150,200,0.3);
  }


  .card-inner { width:100%; height:100%; position:relative; overflow:hidden; border-radius:8px; }
  .card-art {
    position:absolute; top:0; left:0; width:100%; height:100%;
    object-fit:cover; object-position:center top;
    opacity:0.85; pointer-events:none; border-radius:8px;
  }
  .card-emoji {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    font-size:2.5rem; opacity:0.9;
  }
  .card-name {
    position:absolute; bottom:4px; left:0; right:0; text-align:center;
    font-size:0.6rem; font-weight:700; color:rgba(255,255,255,0.7);
    text-transform:uppercase; letter-spacing:1px;
  }
  .card-element-badge {
    position:absolute; top:2px; right:4px; font-size:0.85rem;
  }

  /* Card rank cross (upper-left, FF8-style) */
  .rank-cross {
    position:absolute; top:4px; left:4px; width:36px; height:36px; z-index:3;
  }
  .rank {
    position:absolute; font-family:'Orbitron',sans-serif; font-size:0.65rem; font-weight:900;
    color:#fff; text-shadow:0 1px 3px rgba(0,0,0,0.9), 0 0 6px rgba(0,0,0,0.7);
    z-index:3; line-height:1; text-align:center; width:14px;
  }
  .rank-top    { top:0;    left:50%; transform:translateX(-50%); }
  .rank-bottom { bottom:0; left:50%; transform:translateX(-50%); }
  .rank-left   { left:0;   top:50%; transform:translateY(-50%); }
  .rank-right  { right:0;  top:50%; transform:translateY(-50%); }
  .rank.boosted { color:#5f5; }
  .rank.nerfed { color:#f55; }

  /* Star rating — below rank cross */
  .card-stars {
    position:absolute; top:40px; left:4px; font-size:0.45rem; color:var(--gold);
    letter-spacing:-1px; z-index:3;
  }

  /* ── BOARD ── */
  .board-container { position:relative; display:flex; flex-direction:column; align-items:center; }
  .board {
    display:grid; grid-template-columns:repeat(3,1fr);
    row-gap:12.5px; column-gap:10px;
    padding:34.5px 30px;
    background: linear-gradient(160deg, rgba(60,30,100,0.9), rgba(40,20,80,0.9));
    border:none; border-radius:12px;
    background-size:100% 100%; background-position:center;
    position:relative; overflow:visible;
  }
  .board.has-bg .board-cell {
    background:transparent; border-color:transparent;
  }
  .board-cell {
    width:110px; height:136px; border-radius:8px;
    background:rgba(80,50,140,0.3); border:2px solid rgba(100,200,230,0.25);
    display:flex; align-items:center; justify-content:center;
    transition:all 0.2s; position:relative; overflow:visible;
  }
  .board-cell.highlight {
    border-color:rgba(255,150,200,0.6); background:rgba(255,150,200,0.15);
  }
  .board.has-bg .board-cell.highlight {
    background:rgba(255,150,200,0.12);
  }
  .board-cell .element-icon {
    position:absolute; font-size:1.4rem; opacity:0.25;
  }
  .board-cell .card { cursor:default; border-radius:4px; }
  .info-bar {
    margin-top:8px; padding:6px 20px; background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1); border-radius:6px;
    font-family:'Rajdhani',sans-serif; font-size:0.85rem; color:#aaa;
    text-align:center; min-width:200px;
  }

  /* ── VOLUME CONTROLS ── */
  .vol-toggle {
    position:fixed; top:12px; right:12px; z-index:51;
    width:40px; height:40px; border-radius:50%;
    background:rgba(255,255,255,0.08); border:2px solid rgba(255,255,255,0.15);
    color:#ccc; font-size:1.2rem; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:all 0.2s;
  }
  .vol-toggle:hover { background:rgba(255,255,255,0.15); color:#fff; }
  .vol-panel {
    position:fixed; top:58px; right:12px; z-index:50;
    background:linear-gradient(160deg, rgba(40,20,80,0.95), rgba(25,12,50,0.98));
    border:1px solid rgba(196,77,255,0.3); border-radius:12px;
    padding:14px 16px; display:none; min-width:180px;
    box-shadow:0 4px 20px rgba(0,0,0,0.5);
  }
  .vol-panel.open { display:block; }
  .vol-row {
    display:flex; align-items:center; gap:8px; margin-bottom:10px;
  }
  .vol-row:last-child { margin-bottom:0; }
  .vol-label {
    font-family:'Orbitron',sans-serif; font-size:0.55rem; font-weight:700;
    color:#aaa; letter-spacing:1px; width:32px; flex-shrink:0;
  }
  .vol-slider {
    -webkit-appearance:none; appearance:none; flex:1;
    height:4px; border-radius:2px; outline:none;
    background:rgba(255,255,255,0.15);
  }
  .vol-slider::-webkit-slider-thumb {
    -webkit-appearance:none; appearance:none;
    width:14px; height:14px; border-radius:50%;
    background:#c44dff; cursor:pointer;
    box-shadow:0 0 6px rgba(196,77,255,0.5);
  }
  .vol-slider::-moz-range-thumb {
    width:14px; height:14px; border-radius:50%;
    background:#c44dff; cursor:pointer; border:none;
    box-shadow:0 0 6px rgba(196,77,255,0.5);
  }
  .vol-pct {
    font-family:'Orbitron',sans-serif; font-size:0.55rem;
    color:#888; width:28px; text-align:right; flex-shrink:0;
  }

  /* Title screen volume section */
  .title-vol {
    display:flex; flex-direction:column; gap:8px;
    margin-top:2rem; width:260px;
  }
  .title-vol .vol-row { margin-bottom:4px; }
  .title-vol .vol-label { color:#999; }

  /* ── FLIP ANIMATION ── */
  /* Deal-in animation */
  @keyframes dealFromLeft {
    0%   { transform:translate(-50vw, -20vh) rotate(-25deg) scale(0.5); opacity:0; }
    40%  { opacity:1; }
    100% { transform:translate(0,0) rotate(0deg) scale(1); opacity:1; }
  }
  @keyframes dealFromRight {
    0%   { transform:translate(50vw, -20vh) rotate(25deg) scale(0.5); opacity:0; }
    40%  { opacity:1; }
    100% { transform:translate(0,0) rotate(0deg) scale(1); opacity:1; }
  }
  .card.deal-left {
    animation: dealFromLeft 0.28s cubic-bezier(0.2,0.8,0.3,1) both;
  }
  .card.deal-right {
    animation: dealFromRight 0.28s cubic-bezier(0.2,0.8,0.3,1) both;
  }

  /* Directional flip animations — card flips away from point of contact */
  @keyframes flipFromLeft {
    0% { transform:perspective(400px) rotateY(0deg); }
    50% { transform:perspective(400px) rotateY(90deg); }
    100% { transform:perspective(400px) rotateY(0deg); }
  }
  @keyframes flipFromRight {
    0% { transform:perspective(400px) rotateY(0deg); }
    50% { transform:perspective(400px) rotateY(-90deg); }
    100% { transform:perspective(400px) rotateY(0deg); }
  }
  @keyframes flipFromTop {
    0% { transform:perspective(400px) rotateX(0deg); }
    50% { transform:perspective(400px) rotateX(-90deg); }
    100% { transform:perspective(400px) rotateX(0deg); }
  }
  @keyframes flipFromBottom {
    0% { transform:perspective(400px) rotateX(0deg); }
    50% { transform:perspective(400px) rotateX(90deg); }
    100% { transform:perspective(400px) rotateX(0deg); }
  }
  .card.flip-from-left   { animation: flipFromLeft 0.5s ease-in-out; }
  .card.flip-from-right  { animation: flipFromRight 0.5s ease-in-out; }
  .card.flip-from-top    { animation: flipFromTop 0.5s ease-in-out; }
  .card.flip-from-bottom { animation: flipFromBottom 0.5s ease-in-out; }

  /* Heart sparkle particles */
  .heart-burst { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; overflow:visible; z-index:20; }
  .heart-particle {
    position:absolute; font-size:1rem; opacity:0;
    animation: heartFloat 2s ease-out forwards;
    filter: drop-shadow(0 0 4px rgba(255,100,150,0.7));
  }
  .heart-particle.uwu-particle {
    animation: uwuFloat 3.5s ease-out forwards;
    filter: drop-shadow(0 0 6px rgba(255,150,200,0.9));
  }
  .heart-particle.uwu-place-particle {
    animation: uwuPlaceBurst 2s ease-out forwards;
    filter: drop-shadow(0 0 8px rgba(200,100,255,0.8));
  }
  @keyframes heartFloat {
    0%   { opacity:1; transform:translate(0,0) scale(0.3) rotate(0deg); }
    20%  { opacity:1; transform:scale(1.2); }
    50%  { opacity:0.9; transform:translate(calc(var(--hx)*0.5), calc(var(--hy)*0.5)) scale(1) rotate(calc(var(--hr)*0.4)); }
    100% { opacity:0; transform:translate(var(--hx), var(--hy)) scale(0.3) rotate(var(--hr)); }
  }
  @keyframes uwuFloat {
    0%   { opacity:1; transform:translate(0,0) scale(0.3) rotate(0deg); }
    15%  { opacity:1; transform:scale(1.4); }
    35%  { opacity:1; transform:translate(calc(var(--hx)*0.35), calc(var(--hy)*0.35)) scale(1.1) rotate(calc(var(--hr)*0.3)); }
    60%  { opacity:0.85; transform:translate(calc(var(--hx)*0.7), calc(var(--hy)*0.7)) scale(0.9) rotate(calc(var(--hr)*0.6)); }
    80%  { opacity:0.5; transform:translate(calc(var(--hx)*0.9), calc(var(--hy)*0.9)) scale(0.6) rotate(calc(var(--hr)*0.85)); }
    100% { opacity:0; transform:translate(var(--hx), var(--hy)) scale(0.2) rotate(var(--hr)); }
  }
  @keyframes uwuPlaceBurst {
    0%   { opacity:1; transform:translate(0,0) scale(0.2) rotate(0deg); }
    20%  { opacity:1; transform:scale(1.3); }
    50%  { opacity:0.8; transform:translate(var(--hx), var(--hy)) scale(1) rotate(calc(var(--hr)*0.5)); }
    100% { opacity:0; transform:translate(calc(var(--hx)*1.3), calc(var(--hy)*1.3)) scale(0.3) rotate(var(--hr)); }
  }

  /* ── RESULT SCREEN ── */
  #result-overlay {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85);
    z-index:100; align-items:center; justify-content:center; flex-direction:column;
  }
  #result-overlay.show { display:flex; animation:fadeIn 0.5s; }
  #result-overlay h2 {
    font-family:'Orbitron',sans-serif; font-size:3rem; margin-bottom:1rem;
  }
  #result-overlay .result-sub { font-size:1.2rem; color:#aaa; margin-bottom:2rem; }
  .win-text { color:var(--gold); text-shadow:0 0 30px rgba(255,215,0,0.4); }
  .lose-text { color:var(--red); }
  .draw-text { color:#aaa; }

  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  /* ── TUTORIAL OVERLAY ── */
  #howto-overlay {
    display:none; position:fixed; inset:0;
    background:rgba(5,5,20,0.96); z-index:100;
    align-items:center; justify-content:center;
    flex-direction:column; padding:1rem;
  }
  #howto-overlay.visible { display:flex; }
  .tut-container {
    width:100%; max-width:780px;
    background:linear-gradient(160deg, rgba(40,20,80,0.95), rgba(25,12,50,0.98));
    border:2px solid rgba(196,77,255,0.3);
    border-radius:16px; overflow:hidden;
    box-shadow:0 0 40px rgba(196,77,255,0.15), inset 0 0 60px rgba(100,50,180,0.08);
  }
  .tut-header {
    display:flex; justify-content:space-between; align-items:center;
    padding:14px 24px;
    border-bottom:1px solid rgba(196,77,255,0.2);
    background:rgba(196,77,255,0.06);
  }
  .tut-title {
    font-family:'Orbitron',sans-serif; font-size:1rem; font-weight:700;
    color:#c44dff; letter-spacing:2px;
  }
  .tut-page-num {
    font-family:'Orbitron',sans-serif; font-size:0.75rem; color:#888; letter-spacing:1px;
  }
  .tut-body {
    display:flex; gap:24px; padding:24px;
    min-height:300px; align-items:center;
  }
  .tut-diagram {
    flex:0 0 280px; min-height:240px;
    display:flex; align-items:center; justify-content:center;
    background:rgba(0,0,0,0.3); border-radius:12px;
    border:1px solid rgba(255,255,255,0.06);
    padding:16px; position:relative;
  }
  .tut-text {
    flex:1; color:#ccc; font-size:1.05rem; line-height:1.8;
  }
  .tut-text strong { color:#e0c0ff; }
  .tut-text .rule-name {
    color:#c44dff; font-family:'Orbitron',sans-serif; font-weight:700;
    font-size:1.1rem;
  }
  .tut-footer {
    display:flex; justify-content:space-between; align-items:center;
    padding:14px 24px;
    border-top:1px solid rgba(196,77,255,0.2);
    background:rgba(196,77,255,0.04);
  }
  .tut-nav-btn {
    font-family:'Orbitron',sans-serif; font-size:0.8rem; font-weight:700;
    color:#c44dff; background:rgba(196,77,255,0.1);

  .tut-dots {

  }
  .tut-dot {
    width:8px; height:8px; border-radius:50%;
    background:rgba(196,77,255,0.2); transition:all 0.3s;
  }
  .tut-dot.active { background:#c44dff; box-shadow:0 0 8px rgba(196,77,255,0.6); }

  /* Mini card for diagrams */
  .tut-card {
    width:72px; height:92px; border-radius:6px; position:relative;
    border:2px solid rgba(255,255,255,0.2);
    display:flex; align-items:center; justify-content:center;
    font-family:'Orbitron',sans-serif; font-size:0.55rem; font-weight:900;
    color:#fff; text-shadow:0 1px 3px rgba(0,0,0,0.9);
    overflow:visible;
  }
  .tut-card.blue {
    background:linear-gradient(135deg, rgba(33,100,200,0.85), rgba(33,150,243,0.7));
    border-color:rgba(33,150,243,0.5);
    box-shadow:0 0 10px rgba(33,150,243,0.3);
  }
  .tut-card.red {
    background:linear-gradient(135deg, rgba(200,50,50,0.85), rgba(244,67,54,0.7));
    border-color:rgba(244,67,54,0.5);
    box-shadow:0 0 10px rgba(244,67,54,0.3);
  }
  .tut-card.neutral {
    background:linear-gradient(135deg, rgba(80,80,100,0.85), rgba(60,60,80,0.7));
    border-color:rgba(150,150,170,0.3);
  }
  .tut-card .tc-top { position:absolute; top:3px; left:50%; transform:translateX(-50%); }
  .tut-card .tc-right { position:absolute; right:3px; top:50%; transform:translateY(-50%); }
  .tut-card .tc-bottom { position:absolute; bottom:3px; left:50%; transform:translateX(-50%); }
  .tut-card .tc-left { position:absolute; left:3px; top:50%; transform:translateY(-50%); }
  .tut-card .tc-label {
    position:absolute; bottom:-16px; left:50%; transform:translateX(-50%);
    font-size:0.5rem; color:#aaa; white-space:nowrap; font-weight:400;
    letter-spacing:0.5px;
  }
  .tut-card .tc-center {
    font-size:0.9rem; opacity:0.3;
  }

  /* Mini board for diagrams */
  .tut-board {
    display:grid; grid-template-columns:repeat(3,1fr); gap:4px;
    width:100%; max-width:240px;
  }
  .tut-cell {
    width:76px; height:96px; border-radius:6px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    display:flex; align-items:center; justify-content:center;
    position:relative;
  }
  .tut-cell.highlight-cell {
    border-color:rgba(196,77,255,0.5);
    box-shadow:inset 0 0 12px rgba(196,77,255,0.15);
  }

  /* Arrows for diagrams */
  .tut-arrow {
    position:absolute; color:#ff6b9d; font-size:1.4rem;
    filter:drop-shadow(0 0 4px rgba(255,107,157,0.6));
    z-index:5; animation:tutArrowPulse 1.2s ease-in-out infinite;
  }
  @keyframes tutArrowPulse {
    0%,100% { opacity:0.7; transform:scale(1); }
    50% { opacity:1; transform:scale(1.15); }
  }
  .tut-capture-flash {
    position:absolute; inset:0; border-radius:6px;
    background:rgba(196,77,255,0.15);
    animation:tutFlash 1.5s ease-in-out infinite;
  }
  @keyframes tutFlash {
    0%,100% { opacity:0; }
    50% { opacity:1; }
  }
  .tut-vs {
    font-family:'Orbitron',sans-serif; font-weight:900; font-size:0.7rem;
    color:#ff6b9d; position:absolute; z-index:5;
    text-shadow:0 0 8px rgba(255,107,157,0.6);
  }
  .tut-sum-label {
    font-family:'Orbitron',sans-serif; font-weight:700; font-size:0.55rem;
    color:#FFD700; position:absolute; z-index:5;
    text-shadow:0 0 6px rgba(255,215,0,0.6);
    background:rgba(0,0,0,0.6); padding:2px 5px; border-radius:4px;
  }
  .tut-wall {
    background:repeating-linear-gradient(45deg, rgba(255,215,0,0.08), rgba(255,215,0,0.08) 2px, transparent 2px, transparent 6px);
    border-color:rgba(255,215,0,0.3) !important;
  }
  .tut-elem-icon {
    position:absolute; top:2px; right:2px; font-size:0.7rem; z-index:5;
  }

  @media(max-width:700px){
    .tut-body { flex-direction:column; }
    .tut-diagram { flex:none; width:100%; min-height:200px; }
  }

  /* ── COLLECTION / DECK BUILDER ── */
  #collection-screen {
    min-height:100vh; padding:1rem;
    flex-direction:column; align-items:center;
    animation:fadeIn 0.4s;
    background-image:
      radial-gradient(ellipse at 30% 20%, rgba(80,40,160,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 70% 80%, rgba(160,60,120,0.1) 0%, transparent 50%);
  }
  .coll-layout {
    width:100%; max-width:900px; margin:0 auto;
    display:flex; flex-direction:column; gap:12px;
  }
  .coll-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:0.5rem 0;
  }
  .coll-back-btn {
    font-family:'Orbitron',sans-serif; font-size:0.75rem; font-weight:700;
    color:#c8a0ff; background:rgba(80,50,140,0.4);
    border:1px solid rgba(100,200,230,0.25); border-radius:8px;
    padding:8px 16px; cursor:pointer; transition:all 0.2s;
  }
  .coll-back-btn:hover { background:rgba(80,50,140,0.6); border-color:rgba(100,200,230,0.5); }
  .coll-title {
    font-family:'Orbitron',sans-serif; font-size:1.3rem; font-weight:900;
    background:linear-gradient(135deg, #ff6b9d, #c44dff, #6b9dff);

    letter-spacing:3px;
  }
  .coll-card-count {
    font-family:'Orbitron',sans-serif; font-size:0.7rem; color:rgba(100,200,230,0.6); letter-spacing:1px;
  }

  /* Deck tabs */
  .deck-tabs {
    display:flex; gap:6px; padding:4px 0;
  }
  .deck-tab {
    font-family:'Orbitron',sans-serif; font-size:0.65rem; font-weight:700;
    padding:8px 16px; border-radius:8px 8px 0 0;
    background:rgba(80,50,140,0.25); border:1px solid rgba(100,200,230,0.15);
    border-bottom:none; color:rgba(200,180,230,0.6); cursor:pointer; transition:all 0.2s;
    letter-spacing:1px; position:relative;
  }
  .deck-tab:hover { background:rgba(80,50,140,0.4); color:#c8a0ff; }
  .deck-tab.active {
    background:rgba(60,30,100,0.7); border-color:rgba(100,200,230,0.35);
    color:#c8a0ff;
  }
  .deck-tab.locked { opacity:0.3; }
  .deck-tab .tab-lock { margin-left:4px; font-size:0.6rem; }
  .deck-tab.equipped { border-color:rgba(255,215,0,0.35); }
  .deck-tab.equipped .tab-equip {
    color:#FFD700; margin-left:4px; font-size:0.6rem;
    filter:drop-shadow(0 0 3px rgba(255,215,0,0.5));
  }
  .deck-tab.equipped.active { border-color:rgba(255,215,0,0.5); background:rgba(60,30,100,0.7); }

  /* Deck display */
  .deck-display {
    background:linear-gradient(160deg, rgba(60,30,100,0.6), rgba(40,20,80,0.6));
    border:1px solid rgba(100,200,230,0.2);
    border-radius:0 12px 12px 12px; padding:16px;
    min-height:170px; display:flex; flex-direction:column; align-items:center; justify-content:center;
    box-shadow:inset 0 0 40px rgba(60,30,100,0.3);
  }
  .deck-slots {
    display:flex; gap:12px; justify-content:center; flex-wrap:wrap;
  }
  .deck-slot {
    width:100px; height:130px; border-radius:8px;
    border:2px dashed rgba(100,200,230,0.2);
    background:rgba(80,50,140,0.2);
    display:flex; align-items:center; justify-content:center;
    position:relative; cursor:pointer; transition:all 0.2s;
    overflow:hidden;
  }
  .deck-slot:hover { border-color:rgba(255,150,200,0.5); background:rgba(255,150,200,0.08); }
  .deck-slot.filled {
    border-style:solid; border-color:rgba(100,200,230,0.3);
    background:rgba(80,50,140,0.15);
  }
  .deck-slot .slot-empty {
    font-family:'Orbitron',sans-serif; font-size:1.4rem;
    color:rgba(100,200,230,0.2);
  }
  .deck-slot .slot-card {
    width:100%; height:100%; position:relative; border-radius:6px; overflow:hidden;
  }
  .deck-slot .slot-card img {
    width:100%; height:100%; object-fit:cover; object-position:center top;
    opacity:0.85; border-radius:6px;
  }
  .deck-slot .slot-card .slot-ranks {
    position:absolute; top:2px; left:2px;
    width:30px; height:30px; z-index:3;
  }
  .deck-slot .slot-card .slot-rank {
    position:absolute; font-family:'Orbitron',sans-serif; font-size:0.5rem; font-weight:900;
    color:#fff; text-shadow:0 1px 3px rgba(0,0,0,0.9), 0 0 6px rgba(0,0,0,0.7);
    line-height:1; text-align:center; width:12px;
  }
  .deck-slot .slot-card .slot-rank.r-top { top:0; left:50%; transform:translateX(-50%); }
  .deck-slot .slot-card .slot-rank.r-right { right:0; top:50%; transform:translateY(-50%); }
  .deck-slot .slot-card .slot-rank.r-bottom { bottom:0; left:50%; transform:translateX(-50%); }
  .deck-slot .slot-card .slot-rank.r-left { left:0; top:50%; transform:translateY(-50%); }
  .deck-slot .slot-remove {
    position:absolute; top:4px; right:4px; z-index:5;
    width:18px; height:18px; border-radius:50%;
    background:rgba(244,67,54,0.8); color:#fff;
    font-size:0.6rem; display:flex; align-items:center; justify-content:center;
    opacity:0; transition:opacity 0.2s; cursor:pointer;
    font-weight:700;
  }
  .deck-slot:hover .slot-remove { opacity:1; }
  .deck-slot .slot-name {
    position:absolute; bottom:0; left:0; right:0;
    background:linear-gradient(transparent, rgba(0,0,0,0.8));
    padding:2px 4px; font-size:0.5rem; color:#ddd;
    text-align:center; font-family:'Rajdhani',sans-serif; font-weight:600;
  }

  /* Locked deck message */
  .deck-locked-msg {
    text-align:center; color:rgba(100,200,230,0.4);
    font-family:'Orbitron',sans-serif; font-size:0.8rem;
    letter-spacing:1px;
  }
  .deck-locked-msg .lock-icon { font-size:2rem; margin-bottom:8px; display:block; opacity:0.5; }
  .deck-locked-msg .lock-req {
    font-size:0.65rem; color:rgba(200,180,230,0.4); margin-top:6px;
    font-family:'Rajdhani',sans-serif; letter-spacing:0;
  }

  /* Filter bar */
  .coll-filters {
    display:flex; gap:4px; flex-wrap:wrap; align-items:center; padding:4px 0;
  }
  .coll-filter-btn {
    font-family:'Orbitron',sans-serif; font-size:0.55rem; font-weight:700;
    padding:6px 10px; border-radius:6px;
    background:rgba(80,50,140,0.25); border:1px solid rgba(100,200,230,0.15);
    color:rgba(200,180,230,0.6); cursor:pointer; transition:all 0.2s; letter-spacing:0.5px;
  }
  .coll-filter-btn:hover { background:rgba(80,50,140,0.4); color:#c8a0ff; border-color:rgba(100,200,230,0.3); }
  .coll-filter-btn.active {
    background:rgba(255,150,200,0.15); border-color:rgba(255,150,200,0.4); color:#ff9dc4;
  }
  .coll-filter-sep { color:rgba(100,200,230,0.15); margin:0 4px; }

  /* Card grid */
  .coll-grid {
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(100px, 1fr));
    gap:10px; padding:8px 0 2rem;
    max-height:50vh; overflow-y:auto;
    scrollbar-width:thin; scrollbar-color:rgba(100,200,230,0.2) transparent;
  }
  .coll-grid::-webkit-scrollbar { width:6px; }
  .coll-grid::-webkit-scrollbar-thumb { background:rgba(100,200,230,0.2); border-radius:3px; }

  .coll-card {
    width:100%; aspect-ratio:110/140; border-radius:8px;
    border:2px solid rgba(100,200,230,0.15);
    position:relative; cursor:pointer; transition:all 0.2s;
    overflow:hidden; background:rgba(40,20,80,0.6);
  }
  .coll-card:hover {
    transform:translateY(-3px);
    border-color:rgba(255,150,200,0.5);
    box-shadow:0 4px 16px rgba(255,150,200,0.15), 0 0 8px rgba(80,50,140,0.3);
  }
  .coll-card.in-deck {
    border-color:rgba(255,215,0,0.5);
    box-shadow:0 0 12px rgba(255,215,0,0.2);
  }
  .coll-card.in-deck::after {
    content:'✓'; position:absolute; top:4px; right:4px;
    width:18px; height:18px; border-radius:50%;
    background:rgba(255,215,0,0.85); color:#1a1a2e;
    font-size:0.6rem; display:flex; align-items:center; justify-content:center;
    font-weight:700; z-index:5;
  }
  .coll-card img {
    width:100%; height:100%; object-fit:cover; object-position:center top;
    opacity:0.85; border-radius:6px;
  }
  .coll-card .coll-ranks {
    position:absolute; top:3px; left:3px;
    width:30px; height:30px; z-index:3;
  }
  .coll-card .coll-rank {
    position:absolute; font-family:'Orbitron',sans-serif; font-size:0.5rem; font-weight:900;
    color:#fff; text-shadow:0 1px 3px rgba(0,0,0,0.9), 0 0 6px rgba(0,0,0,0.7);
    line-height:1; text-align:center; width:12px;
  }
  .coll-card .coll-rank.r-top { top:0; left:50%; transform:translateX(-50%); }
  .coll-card .coll-rank.r-right { right:0; top:50%; transform:translateY(-50%); }
  .coll-card .coll-rank.r-bottom { bottom:0; left:50%; transform:translateX(-50%); }
  .coll-card .coll-rank.r-left { left:0; top:50%; transform:translateY(-50%); }
  .coll-card .coll-card-name {
    position:absolute; bottom:0; left:0; right:0;
    background:linear-gradient(transparent, rgba(0,0,0,0.85));
    padding:12px 4px 4px; font-size:0.55rem; color:rgba(200,180,230,0.9);
    text-align:center; font-family:'Rajdhani',sans-serif; font-weight:600;
  }
  .coll-card .coll-rarity-bar {
    position:absolute; bottom:0; left:0; right:0; height:3px;
  }

  /* Silhouette for unowned cards */
  .coll-card.unowned { opacity:0.4; cursor:default; }
  .coll-card.unowned:hover { transform:none; border-color:rgba(100,200,230,0.15); box-shadow:none; }
  .coll-card.unowned img {
    filter:brightness(0); opacity:0.6;
  }
  .coll-card.unowned .coll-ranks { display:none; }
  .coll-card.unowned .coll-card-name { color:rgba(200,180,230,0.3); }

  /* Rarity colors for border bottom bar */
  .rarity-common { background:rgba(170,170,170,0.8); }
  .rarity-uncommon { background:rgba(76,175,80,0.8); }
  .rarity-rare { background:rgba(33,150,243,0.8); }
  .rarity-epic { background:rgba(156,39,176,0.8); }
  .rarity-legendary { background:rgba(255,152,0,0.8); }
  .rarity-unique { background:rgba(255,215,0,0.8); }

  /* ── TUTORIAL DIALOGUE ── */
  .tut-dialogue {
    position:fixed; bottom:0; left:50%; transform:translateX(-50%);
    width:min(600px, 90vw); z-index:80;
    background:linear-gradient(0deg, rgba(10,5,25,0.98), rgba(20,10,40,0.95));
    border-top:2px solid rgba(100,200,230,0.3);
    border-left:1px solid rgba(100,200,230,0.15);
    border-right:1px solid rgba(100,200,230,0.15);
    border-radius:12px 12px 0 0;
    padding:16px 20px 20px;
    display:none;
    box-shadow:0 -4px 30px rgba(0,0,0,0.5);
  }
  .tut-dialogue.visible { display:flex; gap:16px; align-items:flex-start; }
  .tut-portrait {
    flex:0 0 80px; height:80px; border-radius:10px;
    background:linear-gradient(135deg, rgba(40,20,60,0.9), rgba(20,10,40,0.9));
    border:2px solid rgba(100,200,230,0.25);
    display:flex; align-items:center; justify-content:center;
    font-size:2.8rem; position:relative;
    box-shadow:0 0 16px rgba(100,200,230,0.1);
  }
  .tut-portrait-name {
    position:absolute; bottom:-12px; left:50%; transform:translateX(-50%);
    font-family:'Orbitron',sans-serif; font-size:0.5rem; font-weight:700;
    color:rgba(100,200,230,0.7); white-space:nowrap; letter-spacing:1px;
    background:rgba(10,5,25,0.9); padding:1px 6px; border-radius:4px;
  }
  .tut-dialogue-body { flex:1; min-height:60px; display:flex; flex-direction:column; justify-content:center; }
  .tut-dialogue-text {
    font-family:'Rajdhani',sans-serif; font-size:1.05rem; font-weight:500;
    color:#ddd; line-height:1.6; min-height:2.4em;
  }
  .tut-dialogue-hint {
    font-family:'Orbitron',sans-serif; font-size:0.55rem; color:rgba(100,200,230,0.4);
    margin-top:8px; letter-spacing:1px;
  }
  .tut-dialogue-hint.blink { animation: hintBlink 1.5s ease-in-out infinite; }
  @keyframes hintBlink {
    0%,100% { opacity:0.4; }
    50% { opacity:0.8; }
  }

  /* Tutorial cell highlight for expected moves */
  .board-cell.tut-target {
    border-color:rgba(255,215,0,0.6) !important;
    background:rgba(255,215,0,0.1) !important;
    box-shadow:inset 0 0 15px rgba(255,215,0,0.15);
    animation:tutTargetPulse 1.5s ease-in-out infinite;
  }
  @keyframes tutTargetPulse {
    0%,100% { box-shadow:inset 0 0 15px rgba(255,215,0,0.1); }
    50% { box-shadow:inset 0 0 20px rgba(255,215,0,0.25); }
  }
  .card.tut-highlight {
    box-shadow:0 0 16px rgba(255,215,0,0.5) !important;
    border-color:var(--gold) !important;
  }

  /* Lesson complete overlay */
  .tut-lesson-complete {
    position:fixed; inset:0; z-index:90;
    background:rgba(5,5,20,0.9);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    animation:fadeIn 0.5s;
  }
  .tut-lesson-complete h2 {
    font-family:'Orbitron',sans-serif; font-size:1.6rem;
    color:#FFD700; letter-spacing:3px; margin-bottom:1rem;
  }
  .tut-lesson-complete p {
    font-family:'Rajdhani',sans-serif; font-size:1.1rem;
    color:#ccc; margin-bottom:2rem; text-align:center; max-width:400px;
  }

  /* ── RULE ANNOUNCE BUBBLE ── */
  .rule-announce {
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(0.3);
    z-index:75; pointer-events:none;
    font-family:'Orbitron',sans-serif; font-size:2.4rem; font-weight:900;
    letter-spacing:6px; text-transform:uppercase;
    color:#fff; text-shadow:0 0 20px currentColor, 0 0 40px currentColor, 0 2px 8px rgba(0,0,0,0.6);
    opacity:0; animation:ruleAnnounce 1.6s ease-out forwards;
  }
  .rule-announce.same { color:#00e5ff; }
  .rule-announce.plus { color:#ff6ec7; }
  .rule-announce.same-wall { color:#FFD700; }
  .rule-announce.combo { color:#ff4444; }
  @keyframes ruleAnnounce {
    0%   { opacity:0; transform:translate(-50%,-50%) scale(0.3); }
    15%  { opacity:1; transform:translate(-50%,-50%) scale(1.15); }
    30%  { transform:translate(-50%,-50%) scale(0.95); }
    45%  { opacity:1; transform:translate(-50%,-50%) scale(1.05); }
    70%  { opacity:1; transform:translate(-50%,-50%) scale(1); }
    100% { opacity:0; transform:translate(-50%,-50%) scale(1); }
  }

  /* ── UWU EASTER EGG ── */
  @keyframes uwuPop {
    0%   { opacity:0; transform:translate(-50%,-50%) scale(0.5); }
    20%  { opacity:1; transform:translate(-50%,-50%) scale(1.15); }
    40%  { transform:translate(-50%,-50%) scale(0.95); }
    60%  { opacity:1; transform:translate(-50%,-50%) scale(1.05); }
    80%  { opacity:0.8; transform:translate(-50%,-50%) scale(1); }
    100% { opacity:0; transform:translate(-50%,-50%) scale(1) translateY(-30px); }
  }

  /* ── RESPONSIVE ── */
  @media(max-width:700px){
    .game-play-area { flex-direction:column; gap:1rem; }
  }
</style>

// ── DETERMINISTIC RANK GENERATION ──
// Hash a string into a stable 32-bit integer
function hashStr(str){
  let h = 0;
  for(let i=0; i<str.length; i++){
    h = ((h << 5) - h + str.charCodeAt(i)) | 0;
  }
  return Math.abs(h);
}

// Seeded PRNG (mulberry32)
function seededRng(seed){
  return function(){
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// Generate 4 ranks deterministically from card name + rarity
function generateRanks(cardName, rarity){
  const r = RARITIES[rarity];
  const seed = hashStr(cardName + ':' + rarity);
  const rng = seededRng(seed);

  // Determine budget within range
  const budgetRange = r.budgetMax - r.budgetMin + 1;
  const budget = r.budgetMin + Math.floor(rng() * budgetRange);

  // Start at minimums
  const ranks = [r.rankMin, r.rankMin, r.rankMin, r.rankMin];
  let spent = r.rankMin * 4;

  // Unique: guarantee one W(10) on a seeded side
  if(r.guaranteeW){
    const wSlot = Math.floor(rng() * 4);
    ranks[wSlot] = 10;
    spent += (10 - r.rankMin);
  }

  let remaining = budget - spent;

  // Generate an exponent that controls spikiness (0.3=very spiky, 3.0=very flat)
  // Wide range means some cards are glass cannons, others are balanced
  const spikiness = 0.3 + rng() * 2.7;

  // Create raw weights with high variance using power curve
  const rawWeights = [0,1,2,3].map(() => Math.pow(rng(), spikiness));
  const wTotal = rawWeights.reduce((a,b) => a+b, 0) || 1;

  // Shuffle which slot gets which weight for positional variety
  const slotOrder = [0,1,2,3];
  for(let i=3; i>0; i--){
    const j = Math.floor(rng() * (i+1));
    [slotOrder[i], slotOrder[j]] = [slotOrder[j], slotOrder[i]];
  }
  const weights = [0,0,0,0];
  slotOrder.forEach((slot, wi) => { weights[slot] = rawWeights[wi]; });

  // Proportional allocation
  const targets = [0,0,0,0];
  let allocated = 0;
  for(let i=0; i<4; i++){
    const ideal = (weights[i] / wTotal) * remaining;
    const maxAdd = r.rankMax - ranks[i];
    targets[i] = Math.min(Math.floor(ideal), maxAdd);
    allocated += targets[i];
  }

  // Apply targets
  for(let i=0; i<4; i++){
    ranks[i] += targets[i];
  }
  remaining -= allocated;

  // Distribute leftover (from floor rounding) in shuffled order
  const distOrder = [0,1,2,3];
  for(let i=3; i>0; i--){
    const j = Math.floor(rng() * (i+1));
    [distOrder[i], distOrder[j]] = [distOrder[j], distOrder[i]];
  }
  // Sort by who has the most headroom, with shuffle as tiebreak
  distOrder.sort((a,b) => (r.rankMax - ranks[a]) - (r.rankMax - ranks[b]));
  distOrder.reverse();

  while(remaining > 0){
    let placed = false;
    for(let k=0; k<4 && remaining>0; k++){
      const idx = distOrder[k];
      if(ranks[idx] < r.rankMax){
        ranks[idx]++;
        remaining--;
        placed = true;
      }
    }
    if(!placed) break;
  }

  // Clamp safety
  return ranks.map(v => Math.max(r.rankMin, Math.min(r.rankMax, v)));
}

let tutPage = 0;

function showHowToPlay(){
  tutPage = 0;
  const el = document.getElementById('howto-overlay');
  // Build dots
  const dotsEl = document.getElementById('tut-dots');
  dotsEl.innerHTML = TUT_PAGES.map((_,i)=>`<div class="tut-dot${i===0?' active':''}"></div>`).join('');
  renderTutPage();
  el.classList.add('visible');
  el.style.display = 'flex';
  document.addEventListener('keydown', tutKeyHandler);
}

function closeTutorial(){
  const el = document.getElementById('howto-overlay');
  el.classList.remove('visible');
  el.style.display = 'none';
  document.removeEventListener('keydown', tutKeyHandler);
}

function tutKeyHandler(e){
  if(e.key === 'ArrowRight' || e.key === 'ArrowDown') tutNav(1);
  else if(e.key === 'ArrowLeft' || e.key === 'ArrowUp') tutNav(-1);
  else if(e.key === 'Escape') closeTutorial();
}

function tutNav(dir){
  const newPage = tutPage + dir;
  if(newPage < 0 || newPage >= TUT_PAGES.length) return;
  tutPage = newPage;
  renderTutPage();
}

function renderTutPage(){
  const page = TUT_PAGES[tutPage];
  document.getElementById('tut-title').textContent = page.title;
  document.getElementById('tut-page-num').textContent = `${tutPage+1} / ${TUT_PAGES.length}`;
  document.getElementById('tut-diagram').innerHTML = page.diagram;
  document.getElementById('tut-text').innerHTML = page.text;
  document.getElementById('tut-prev').disabled = tutPage === 0;
  // Change last page NEXT button to CLOSE
  const nextBtn = document.getElementById('tut-next');
  if(tutPage === TUT_PAGES.length - 1){
    nextBtn.textContent = 'CLOSE ✕';
    nextBtn.onclick = closeTutorial;
  } else {
    nextBtn.textContent = 'NEXT ▶';
    nextBtn.onclick = ()=>tutNav(1);
  }
  // Update dots
  document.querySelectorAll('.tut-dot').forEach((d,i)=>{
    d.classList.toggle('active', i===tutPage);
  });
}

function buildRuleGrid(){
  const grid = document.getElementById('rule-grid');
  grid.innerHTML='';
  RULES.forEach(r=>{
    const div = document.createElement('div');
    div.className = 'rule-toggle' + (state.rules[r.id]?' active':'');
    div.innerHTML = `<div class="rule-indicator"></div><div><div class="rule-label">${r.name}</div><div class="rule-desc">${r.desc}</div></div>`;
    div.onclick = ()=>{ state.rules[r.id]=!state.rules[r.id]; div.classList.toggle('active'); };
    grid.appendChild(div);
  });
}

function setDifficulty(d, btn){
  state.difficulty=d;
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function buildDeckPicker(){
  const picker = document.getElementById('deck-picker');
  picker.innerHTML='';
  state.playerDeck = [];
  RARITY_ORDER.forEach(rarity=>{
    const r = RARITIES[rarity];
    const header = document.createElement('div');
    header.style.cssText = `width:100%;font-family:'Orbitron',sans-serif;font-size:0.85rem;color:${r.color};margin-top:1rem;margin-bottom:0.25rem;letter-spacing:2px;`;
    header.textContent = r.label.toUpperCase();
    picker.appendChild(header);

    const row = document.createElement('div');
    row.style.cssText = 'display:flex;flex-wrap:wrap;gap:10px;width:100%;';

    ALL_CARDS.filter(c=>c.rarity===rarity).forEach(c=>{
      const div = document.createElement('div');
      div.className='deck-card-pick';
      div.style.borderColor = r.color + '40';
      div.innerHTML = `<div class="card-emoji">${c.emoji}</div><div class="card-rank">${c.ranks.map(v=>v>=10?'W':v).join(' ')}</div><div class="card-name">${c.name}</div>`;
      div.onclick = ()=>{
        const idx = state.playerDeck.indexOf(c.id);
        if(idx>=0){ state.playerDeck.splice(idx,1); div.classList.remove('selected'); div.style.borderColor=r.color+'40'; }
        else if(state.playerDeck.length<5){ state.playerDeck.push(c.id); div.classList.add('selected'); div.style.borderColor=r.color; }
        document.getElementById('start-btn').disabled = state.playerDeck.length!==5;
      };
      row.appendChild(div);
    });
    picker.appendChild(row);
  });
  document.getElementById('start-btn').disabled=true;
}

// ── COLLECTION / DECK BUILDER ──
const MAX_DECKS = 5;
const DECK_SIZE = 5;
let collState = {
  decks: [[], [], [], [], []], // 5 deck slots, each holds up to 5 card IDs
  activeDeck: 0,
  equippedDeck: 0, // the deck used when PLAY GAME is pressed
  unlockedDecks: 2, // first 2 unlocked, rest locked
  ownedCardIds: ALL_CARDS.map(c => c.id), // all owned for now
  filter: 'all',
  showUnowned: false,
};

// Persist decks to localStorage
function saveDecks(){
  try {
    localStorage.setItem('wb_decks', JSON.stringify(collState.decks));
    localStorage.setItem('wb_activeDeck', collState.activeDeck);
    localStorage.setItem('wb_equippedDeck', collState.equippedDeck);
  } catch(e){}
}
function loadDecks(){
  try {
    const d = localStorage.getItem('wb_decks');
    if(d) collState.decks = JSON.parse(d);
    const a = localStorage.getItem('wb_activeDeck');
    if(a !== null) collState.activeDeck = parseInt(a);
    const e = localStorage.getItem('wb_equippedDeck');
    if(e !== null) collState.equippedDeck = parseInt(e);
  } catch(e){}
}
loadDecks();

function showCollection(){
  showScreen('collection-screen');
  renderDeckTabs();
  renderDeckDisplay();
  renderCollGrid();
}

function renderDeckTabs(){
  const container = document.getElementById('deck-tabs');
  container.innerHTML = '';
  const labels = ['DECK 1','DECK 2','DECK 3','DECK 4','DECK 5'];
  for(let i=0; i<MAX_DECKS; i++){
    const tab = document.createElement('button');
    const locked = i >= collState.unlockedDecks;
    const equipped = i === collState.equippedDeck;
    tab.className = 'deck-tab' + (i===collState.activeDeck?' active':'') + (locked?' locked':'') + (equipped?' equipped':'');
    const equipIcon = equipped ? ' <span class="tab-equip">⚔</span>' : '';
    tab.innerHTML = labels[i] + (locked ? ' <span class="tab-lock">🔒</span>' : equipIcon);
    tab.onclick = ()=>{ collState.activeDeck = i; saveDecks(); renderDeckTabs(); renderDeckDisplay(); renderCollGrid(); };
    container.appendChild(tab);
  }
}

function renderDeckDisplay(){
  const container = document.getElementById('deck-display');
  const idx = collState.activeDeck;
  const locked = idx >= collState.unlockedDecks;

  if(locked){
    container.innerHTML = `<div class="deck-locked-msg">
      <span class="lock-icon">🔒</span>
      DECK LOCKED
      <div class="lock-req">Complete challenges on harem-lit.com to unlock additional deck slots</div>
    </div>`;
    return;
  }

  const deck = collState.decks[idx];
  const slotsEl = document.createElement('div');
  slotsEl.className = 'deck-slots';
  slotsEl.id = 'deck-slots';

  for(let s=0; s<DECK_SIZE; s++){
    const slot = document.createElement('div');
    slot.className = 'deck-slot';
    if(s < deck.length){
      const cardId = deck[s];
      const card = ALL_CARDS.find(c=>c.id===cardId);
      if(card){
        slot.classList.add('filled');
        const ranks = card.ranks;
        const dispRank = v => v===10?'W':v;
        slot.innerHTML = `
          <div class="slot-card">
            <img src="${card.image}" alt="${card.name}">
            <div class="slot-ranks">
              <span class="slot-rank r-top">${dispRank(ranks[0])}</span>
              <span class="slot-rank r-right">${dispRank(ranks[1])}</span>
              <span class="slot-rank r-bottom">${dispRank(ranks[2])}</span>
              <span class="slot-rank r-left">${dispRank(ranks[3])}</span>
            </div>
            <div class="slot-name">${card.name}</div>
            <div class="slot-remove" onclick="event.stopPropagation();removeFromDeck(${s})">✕</div>
          </div>
        `;
        slot.style.borderColor = getRarityColor(card.rarity);
      }
    } else {
      slot.innerHTML = '<span class="slot-empty">+</span>';
      slot.onclick = ()=>{};
    }
    slotsEl.appendChild(slot);
  }
  container.innerHTML = '';
  container.appendChild(slotsEl);

  // Equip button
  const equipped = idx === collState.equippedDeck;
  const equipRow = document.createElement('div');
  equipRow.style.cssText = 'display:flex;justify-content:center;margin-top:10px;';
  if(equipped){
    equipRow.innerHTML = '<span style="font-family:Orbitron,sans-serif;font-size:0.65rem;color:#FFD700;letter-spacing:1px;">⚔ EQUIPPED FOR BATTLE ⚔</span>';
  } else {
    const eBtn = document.createElement('button');
    eBtn.className = 'coll-filter-btn';
    eBtn.style.cssText = 'padding:8px 20px;font-size:0.65rem;' + (deck.length===DECK_SIZE ? 'color:#FFD700;border-color:rgba(255,215,0,0.4);' : 'opacity:0.3;cursor:not-allowed;');
    eBtn.textContent = '⚔ EQUIP DECK';
    if(deck.length === DECK_SIZE){
      eBtn.onclick = ()=>{ collState.equippedDeck = idx; saveDecks(); renderDeckTabs(); renderDeckDisplay(); };
    }
    equipRow.appendChild(eBtn);
  }
  container.appendChild(equipRow);
}

function getRarityColor(rarity){
  const colors = {common:'#aaa',uncommon:'#4CAF50',rare:'#2196F3',epic:'#9C27B0',legendary:'#FF9800',unique:'#FFD700'};
  return colors[rarity] || '#aaa';
}

function removeFromDeck(slotIdx){
  const deck = collState.decks[collState.activeDeck];
  deck.splice(slotIdx, 1);
  saveDecks();
  renderDeckDisplay();
  renderCollGrid();
}

function addToDeck(cardId){
  const idx = collState.activeDeck;
  if(idx >= collState.unlockedDecks) return;
  const deck = collState.decks[idx];
  if(deck.length >= DECK_SIZE) return;
  if(deck.includes(cardId)) return; // no duplicates
  deck.push(cardId);
  saveDecks();
  renderDeckDisplay();
  renderCollGrid();
}

function setCollFilter(filter, btn){
  collState.filter = filter;
  document.querySelectorAll('.coll-filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // Keep unowned toggle state separate
  if(filter !== 'unowned') document.getElementById('filter-unowned').classList.toggle('active', collState.showUnowned);
  renderCollGrid();
}

function toggleUnownedFilter(btn){
  collState.showUnowned = !collState.showUnowned;
  btn.classList.toggle('active', collState.showUnowned);
  renderCollGrid();
}

function renderCollGrid(){
  const grid = document.getElementById('coll-grid');
  grid.innerHTML = '';

  const activeDeck = collState.decks[collState.activeDeck] || [];
  const ownedSet = new Set(collState.ownedCardIds);

  // Filter cards
  let cards = [...ALL_CARDS];
  if(collState.filter !== 'all'){
    cards = cards.filter(c => c.rarity === collState.filter);
  }

  // Split into owned and unowned
  let owned = cards.filter(c => ownedSet.has(c.id));
  let unowned = cards.filter(c => !ownedSet.has(c.id));

  // Update card count
  const countEl = document.getElementById('coll-card-count');
  if(countEl) countEl.textContent = `${collState.ownedCardIds.length} / ${ALL_CARDS.length}`;

  // Render owned cards
  owned.forEach(card => {
    const el = createCollCard(card, false, activeDeck.includes(card.id));
    grid.appendChild(el);
  });

  // Render unowned cards if toggle is on
  if(collState.showUnowned){
    unowned.forEach(card => {
      const el = createCollCard(card, true, false);
      grid.appendChild(el);
    });
  }
}

function createCollCard(card, unowned, inDeck){
  const el = document.createElement('div');
  el.className = 'coll-card' + (unowned?' unowned':'') + (inDeck?' in-deck':'');

  const ranks = card.ranks;
  const dispRank = v => v===10?'W':v;

  el.innerHTML = `
    <img src="${card.image}" alt="${card.name}">
    <div class="coll-ranks">
      <span class="coll-rank r-top">${dispRank(ranks[0])}</span>
      <span class="coll-rank r-right">${dispRank(ranks[1])}</span>
      <span class="coll-rank r-bottom">${dispRank(ranks[2])}</span>
      <span class="coll-rank r-left">${dispRank(ranks[3])}</span>
    </div>
    <div class="coll-card-name">${card.name}</div>
    <div class="coll-rarity-bar rarity-${card.rarity}"></div>
  `;

  if(!unowned){
    el.onclick = ()=>{
      const deck = collState.decks[collState.activeDeck];
      if(inDeck){
        // Remove from deck
        const dIdx = deck.indexOf(card.id);
        if(dIdx > -1) deck.splice(dIdx, 1);
      } else {
        // Add to deck
        if(deck.length < DECK_SIZE && !deck.includes(card.id)){
          deck.push(card.id);
        }
      }
      saveDecks();
      renderDeckDisplay();
      renderCollGrid();
    };
  }

  return el;
}

// Play using the active deck (or random if empty)
function playWithDeck(){
  const deck = collState.decks[collState.equippedDeck];
  if(deck.length === DECK_SIZE){
    // Use the selected deck
    state.board = Array(9).fill(null);
    state.selectedCard = null;
    state.turn = 'blue';
    state.gameActive = true;
    state.animating = false;
    state.boardElements = Array(9).fill(null);

    state.playerHand = deck.map(id => {
      const card = ALL_CARDS.find(c=>c.id===id);
      return {...card, owner:'blue'};
    });
    // AI still gets random hand
    const available = ALL_CARDS.filter(c => !deck.includes(c.id));
    const aiPool = shuffle([...available]);
    state.aiHand = aiPool.slice(0,5).map(c=>({...c, owner:'red'}));

    showScreen('game-screen');
    renderGame();
    startMusic();
    dealInAnimation(()=>{ updateTurnIndicator(); });
  } else {
    // Not enough cards — fall back to random
    startGame();
  }
}

// ── START GAME (DEMO MODE — random decks, normal rules) ──
function startGame(){
  state.board = Array(9).fill(null);
  state.selectedCard = null;
  state.turn = 'blue';
  state.gameActive = true;
  state.animating = false;
  state.boardElements = Array(9).fill(null);

  // Demo mode: always random decks
  const pool = shuffle([...ALL_CARDS]);
  state.playerHand = pool.slice(0,5).map(c=>({...c, owner:'blue'}));
  state.aiHand = pool.slice(5,10).map(c=>({...c, owner:'red'}));

  showScreen('game-screen');
  renderGame();
  startMusic();

  // Deal-in animation
  dealInAnimation(()=>{
    // Cards are dealt — game is now playable
    updateTurnIndicator();
  });
}

function pickAIDeck(){
  let pool = [...ALL_CARDS];
  let allowedRarities;
  switch(state.difficulty){
    case 'easy':   allowedRarities = ['common','uncommon']; break;
    case 'normal': allowedRarities = ['common','uncommon','rare','epic']; break;
    case 'hard':   allowedRarities = RARITY_ORDER; break;
  }
  pool = pool.filter(c=>allowedRarities.includes(c.rarity));
  // Hard mode: bias toward higher rarity
  if(state.difficulty==='hard'){
    pool.sort((a,b)=> RARITY_ORDER.indexOf(b.rarity) - RARITY_ORDER.indexOf(a.rarity));
    pool = pool.slice(0, Math.min(15, pool.length));
  }
  return shuffle(pool).slice(0,5).map(c=>({...c, owner:'red'}));
}

// ── RENDERING ──
function renderGame(){
  renderBoard();
  renderHand('player-hand', state.playerHand, 'blue');
  renderHand('ai-hand', state.aiHand, 'red');
  updateScore();
  updateTurnIndicator();
  renderActiveRules();
}

function renderBoard(){
  const board = document.getElementById('board');
  board.innerHTML='';
  // Apply board background if set
  if(state.boardImage){
    board.style.backgroundImage = `url(${state.boardImage})`;
    board.classList.add('has-bg');
  } else {
    board.classList.remove('has-bg');
  }
  for(let i=0;i<9;i++){
    const cell = document.createElement('div');
    cell.className = 'board-cell';
    if(state.boardElements[i]){
      const icon = document.createElement('span');
      icon.className='element-icon';
      icon.textContent = ELEM_ICONS[state.boardElements[i]];
      cell.appendChild(icon);
    }
    if(state.board[i]){
      cell.appendChild(createCardElement(state.board[i].card, state.board[i].owner, false, i));
    }
    if(!state.board[i] && state.selectedCard!==null){
      cell.classList.add('highlight');
    }
    // Click placement (fallback)
    cell.onclick = ()=> placeCard(i);
    // Drop placement
    if(!state.board[i] && !tutMode){
      cell.ondragover = (e)=>{ e.preventDefault(); e.dataTransfer.dropEffect='move'; cell.classList.add('drop-hover'); };
      cell.ondragleave = ()=>{ cell.classList.remove('drop-hover'); };
      cell.ondrop = (e)=>{
        e.preventDefault();
        cell.classList.remove('drop-hover');
        const cardIdx = parseInt(e.dataTransfer.getData('text/plain'));
        if(!isNaN(cardIdx) && state.turn==='blue' && state.gameActive && !state.animating){
          state.selectedCard = cardIdx;
          placeCard(i);
        }
      };
    }
    board.appendChild(cell);
  }
}

function renderHand(containerId, hand, owner){
  const STACK_OFFSET = 70; // 50% of 140px card height
  const container = document.getElementById(containerId);
  container.innerHTML='';

  const label = document.createElement('div');
  label.className='hand-label';
  label.textContent = owner==='blue' ? 'PLAYER' : 'AI';
  container.appendChild(label);

  // Card stack container
  const stack = document.createElement('div');
  stack.className='hand-stack';
  const totalHeight = hand.length > 0 ? (hand.length - 1) * STACK_OFFSET + 140 : 0;
  stack.style.height = totalHeight + 'px';

  hand.forEach((card,idx)=>{
    const el = createCardElement(card, owner, false);
    el.style.top = (idx * STACK_OFFSET) + 'px';
    el.style.zIndex = idx + 1;
    if(owner==='blue' && state.turn==='blue' && state.gameActive){
      // Click fallback
      el.onclick = ()=> selectCard(idx);
      if(state.selectedCard===idx) el.classList.add('selected');
      // Drag support (disabled in tutorial)
      if(tutMode){ el.draggable = false; }
      else { el.draggable = true; }
      el.classList.add('draggable');
      el.ondragstart = (e)=>{
        state.draggingCardIdx = idx;
        el.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', idx);
        // Highlight valid cells
        setTimeout(()=> highlightDropZones(true), 0);
      };
      el.ondragend = ()=>{
        el.classList.remove('dragging');
        state.draggingCardIdx = null;
        highlightDropZones(false);
      };
    }
    el.onmouseenter = ()=>{
      document.getElementById('info-bar').textContent = card.name + (card.element ? ' [' + card.element.toUpperCase() + ']' : '');
    };
    el.onmouseleave = ()=>{
      document.getElementById('info-bar').textContent = state.turn==='blue' ? 'Select a card' : 'AI is thinking...';
    };
    stack.appendChild(el);
  });
  container.appendChild(stack);

  // Score number below stack
  const score = document.createElement('div');
  score.className = `hand-score ${owner==='blue'?'blue':'red'}`;
  score.id = `score-${owner==='blue'?'blue':'red'}`;
  container.appendChild(score);
}

function createCardElement(card, owner, facedown=false, boardIdx=-1){
  const div = document.createElement('div');
  div.className = `card ${owner}` + (facedown?' facedown':'');

  if(!facedown){
    const ranks = getEffectiveRanks(card, boardIdx);
    const inner = document.createElement('div');
    inner.className='card-inner';

    // Rank cross (upper-left, FF8-style)
    const cross = document.createElement('div');
    cross.className='rank-cross';
    const positions = ['top','right','bottom','left'];
    positions.forEach((pos,i)=>{
      const r = document.createElement('div');
      r.className = `rank rank-${pos}`;
      const baseVal = card.ranks[i];
      const effVal = ranks[i];
      if(effVal > baseVal) r.classList.add('boosted');
      else if(effVal < baseVal) r.classList.add('nerfed');
      r.textContent = effVal >= 10 ? 'W' : effVal;
      cross.appendChild(r);
    });
    inner.appendChild(cross);

    // Rarity indicator
    const rarityInfo = RARITIES[card.rarity];
    const stars = document.createElement('div');
    stars.className='card-stars';
    stars.style.color = rarityInfo.color;
    const starCount = RARITY_ORDER.indexOf(card.rarity) + 1;
    stars.textContent = '★'.repeat(starCount);
    inner.appendChild(stars);

    // Element badge
    if(card.element){
      const badge = document.createElement('div');
      badge.className='card-element-badge';
      badge.textContent = ELEM_ICONS[card.element];
      inner.appendChild(badge);
    }

    // Card art: image if available, else emoji fallback
    if(card.image){
      const img = document.createElement('img');
      img.className='card-art';
      img.src = card.image;
      img.alt = card.name;
      img.draggable = false;
      inner.appendChild(img);
    } else {
      const emoji = document.createElement('div');
      emoji.className='card-emoji';
      emoji.textContent = card.emoji;
      inner.appendChild(emoji);
    }

    // Name
    const name = document.createElement('div');
    name.className='card-name';
    name.textContent=card.name;
    inner.appendChild(name);

    div.appendChild(inner);
  }
  return div;
}

function getEffectiveRanks(card, boardIdx){
  let ranks = [...card.ranks];
  if(state.rules.elemental && boardIdx >= 0 && state.boardElements[boardIdx]){
    const cellElem = state.boardElements[boardIdx];
    if(card.element === cellElem){
      ranks = ranks.map(r=>Math.min(r+1, 10));
    } else {
      ranks = ranks.map(r=>Math.max(r-1, 1));
    }
  }
  return ranks;
}

function updateScore(){
  let blue=0, red=0;
  state.board.forEach(cell=>{ if(cell){ cell.owner==='blue'?blue++:red++; }});
  blue += state.playerHand.length;
  red += state.aiHand.length;
  document.getElementById('score-blue').textContent=blue;
  document.getElementById('score-red').textContent=red;
}

function updateTurnIndicator(){
  const el = document.getElementById('turn-indicator');
  el.textContent = state.turn==='blue' ? "Your turn" : "AI is thinking...";
  el.style.color = state.turn==='blue' ? 'var(--blue)' : 'var(--red)';
  const info = document.getElementById('info-bar');
  if(info) info.textContent = state.turn==='blue' ? 'Select a card' : 'AI is thinking...';
}

function renderActiveRules(){
  const bar = document.getElementById('active-rules-bar');
  bar.innerHTML='';
  RULES.forEach(r=>{
    if(state.rules[r.id]){
      const tag = document.createElement('span');
      tag.className='active-rule-tag';
      tag.textContent=r.name;

// ── CARD SELECTION & PLACEMENT ──
function highlightDropZones(show){
  const cells = document.getElementById('board').children;
  for(let i=0; i<cells.length; i++){
    if(!state.board[i]){
      cells[i].classList.toggle('highlight', show);
    }
  }
}

function selectCard(idx){
  if(state.turn!=='blue' || !state.gameActive || state.animating) return;
  state.selectedCard = state.selectedCard===idx ? null : idx;
  renderGame();
}

function placeCard(cellIdx){
  if(!state.gameActive || state.animating) return;
  if(state.board[cellIdx]) return;

  if(state.turn==='blue'){
    if(state.selectedCard===null) return;
    const card = state.playerHand.splice(state.selectedCard, 1)[0];
    executePlace(card, cellIdx, 'blue');
  }
}

function executePlace(card, cellIdx, owner){
  state.animating = true;
  state.board[cellIdx] = { card, owner };
  state.selectedCard = null;
  playPlaceSound(owner);
  renderGame();
  if(uwuMode) spawnPlaceBurst(cellIdx);

  // Process captures after short delay for visual feedback
  setTimeout(()=>{
    const flipped = processCaptures(cellIdx);
    animateFlips(flipped, ()=>{
      state.animating = false;
      updateScore();

      // In tutorial mode, don't switch turns or trigger AI — the lesson script controls flow
      if(tutMode) {
        renderGame();
        return;
      }

      // Check game end
      if(state.board.every(c=>c!==null)){
        endGame();
        return;
      }

      // Switch turn
      state.turn = state.turn==='blue'?'red':'blue';
      renderGame();

      if(state.turn==='red'){
        setTimeout(()=> aiTurn(), 600 + Math.random()*800);
      }
    });
  }, 200);
}

// ── RULE ANNOUNCE ──
function announceRule(ruleName){
  const el = document.createElement('div');
  el.className = 'rule-announce ' + ruleName.toLowerCase().replace(/\s+/g,'-');
  el.textContent = ruleName;
  document.body.appendChild(el);
  setTimeout(()=> el.remove(), 1800);
}

// ── CAPTURE LOGIC ──
function processCaptures(cellIdx){
  const placed = state.board[cellIdx];
  const placedRanks = getEffectiveRanks(placed.card, cellIdx);
  const adj = getAdjacent(cellIdx);
  let allFlipped = []; // {idx, fromIdx} — which cell flipped and which cell caused it

  // Same & Plus rules
  let sameFlips = [];
  let plusFlips = [];

  if(state.rules.same || state.rules.plus){
    const matchingSame = [];
    const sums = [];

    adj.forEach(({idx, placedSide, adjSide})=>{
      const target = state.board[idx];
      let targetVal, placedVal;

      if(target){
        const targetRanks = getEffectiveRanks(target.card, idx);
        placedVal = placedRanks[placedSide];
        targetVal = targetRanks[adjSide];
        if(state.rules.same && placedVal === targetVal){
          matchingSame.push({idx, placedVal, targetVal});
        }
        if(state.rules.plus){
          sums.push({idx, sum: placedVal + targetVal, owner: target.owner});
        }
      } else if(state.rules.sameWall){
      }
    });

    if(state.rules.same && state.rules.sameWall){
      const wallAdj = getWallAdjacent(cellIdx);
      wallAdj.forEach(({placedSide})=>{
        const placedVal = placedRanks[placedSide];
        if(placedVal === 10){
          matchingSame.push({idx:-1, placedVal:10, targetVal:10});
        }
      });
    }

    if(state.rules.same && matchingSame.length >= 2){
      const opponentMatches = matchingSame.filter(m=> m.idx>=0 && state.board[m.idx] && state.board[m.idx].owner !== placed.owner);
      if(opponentMatches.length > 0){
        const hasWallMatch = matchingSame.some(m=> m.idx===-1);
        if(hasWallMatch && state.rules.sameWall) announceRule('Same Wall');
        else announceRule('Same');
        matchingSame.forEach(m=>{
          if(m.idx>=0 && state.board[m.idx] && state.board[m.idx].owner !== placed.owner){
            sameFlips.push(m.idx);
          }
        });
      }
    }

    if(state.rules.plus){
      if(state.rules.sameWall){
        const wallAdj = getWallAdjacent(cellIdx);
        wallAdj.forEach(({placedSide})=>{
          sums.push({idx:-1, sum: placedRanks[placedSide] + 10, owner: placed.owner});
        });
      }
      const sumMap = {};
      sums.forEach(s=>{
        if(!sumMap[s.sum]) sumMap[s.sum]=[];
        sumMap[s.sum].push(s);
      });
      let plusTriggered = false;
      Object.values(sumMap).forEach(group=>{
        if(group.length>=2){
          const hasOpponent = group.some(g=> g.idx>=0 && state.board[g.idx] && state.board[g.idx].owner !== placed.owner);
          if(hasOpponent){
            if(!plusTriggered){ announceRule('Plus'); plusTriggered = true; }
            group.forEach(g=>{
              if(g.idx>=0 && state.board[g.idx] && state.board[g.idx].owner !== placed.owner){
                plusFlips.push(g.idx);
              }
            });
          }
        }
      });
    }
  }

  const specialFlips = [...new Set([...sameFlips, ...plusFlips])];
  specialFlips.forEach(idx=>{
    state.board[idx].owner = placed.owner;
    allFlipped.push({idx, fromIdx: cellIdx, special: true});
  });

  if(state.rules.combo && specialFlips.length > 0){
    let comboAnnounced = false;
    let comboQueue = [...specialFlips];
    while(comboQueue.length > 0){
      const ci = comboQueue.shift();
      const comboCard = state.board[ci];
      const comboRanks = getEffectiveRanks(comboCard.card, ci);
      const comboAdj = getAdjacent(ci);
      comboAdj.forEach(({idx, placedSide, adjSide})=>{
        const target = state.board[idx];
        if(target && target.owner !== comboCard.owner){
          const targetRanks = getEffectiveRanks(target.card, idx);
          if(comboRanks[placedSide] > targetRanks[adjSide]){
            state.board[idx].owner = comboCard.owner;
            if(!allFlipped.find(f=>f.idx===idx)){
              if(!comboAnnounced){ setTimeout(()=>announceRule('Combo'), 400); comboAnnounced = true; }
              allFlipped.push({idx, fromIdx: ci, special: true});
              comboQueue.push(idx);
            }
          }
        }
      });
    }
  }

  // Normal captures
  adj.forEach(({idx, placedSide, adjSide})=>{
    const target = state.board[idx];
    if(target && target.owner !== placed.owner && !allFlipped.find(f=>f.idx===idx)){
      const targetRanks = getEffectiveRanks(target.card, idx);
      if(placedRanks[placedSide] > targetRanks[adjSide]){
        state.board[idx].owner = placed.owner;
        allFlipped.push({idx, fromIdx: cellIdx, special: false});
      }
    }
  });

  return allFlipped;
}

function getAdjacent(cellIdx){
  const row = Math.floor(cellIdx/3), col = cellIdx%3;
  const adj = [];
  // Top: placedSide=0 (top of placed), adjSide=2 (bottom of target)
  if(row>0 && state.board[cellIdx-3]) adj.push({idx:cellIdx-3, placedSide:0, adjSide:2});
  // Right: placedSide=1, adjSide=3
  if(col<2 && state.board[cellIdx+1]) adj.push({idx:cellIdx+1, placedSide:1, adjSide:3});
  // Bottom: placedSide=2, adjSide=0
  if(row<2 && state.board[cellIdx+3]) adj.push({idx:cellIdx+3, placedSide:2, adjSide:0});
  // Left: placedSide=3, adjSide=1
  if(col>0 && state.board[cellIdx-1]) adj.push({idx:cellIdx-1, placedSide:3, adjSide:1});
  return adj;
}

function getWallAdjacent(cellIdx){
  const row = Math.floor(cellIdx/3), col = cellIdx%3;
  const walls = [];
  if(row===0) walls.push({placedSide:0}); // top wall
  if(col===2) walls.push({placedSide:1}); // right wall
  if(row===2) walls.push({placedSide:2}); // bottom wall
  if(col===0) walls.push({placedSide:3}); // left wall
  return walls;
}
